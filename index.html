<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taka</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #000;
    --card-bg: #1c1c1e;
    --card-border: rgba(255,255,255,.08);
    --text-primary: #f5f5f7;
    --text-secondary: rgba(255,255,255,.5);
    --accent: #2997ff;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Hero ── */
  .hero {
    text-align: center;
    margin-bottom: 4rem;
  }

  .avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, #2997ff 0%, #5e5ce6 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    margin: 0 auto 1.5rem;
    box-shadow: 0 0 0 1px rgba(255,255,255,.1);
  }

  .hero h1 {
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 700;
    letter-spacing: -.02em;
    line-height: 1.05;
    background: linear-gradient(180deg, #fff 60%, rgba(255,255,255,.4));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero p {
    margin-top: .75rem;
    font-size: 17px;
    color: var(--text-secondary);
    font-weight: 400;
    letter-spacing: .01em;
  }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 1rem;
    width: 100%;
    max-width: 820px;
  }

  /* ── Card ── */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 18px;
    padding: 1.75rem;
    text-decoration: none;
    color: inherit;
    transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: .5rem;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: radial-gradient(600px circle at var(--mx,50%) var(--my,50%), rgba(255,255,255,.04), transparent 40%);
    pointer-events: none;
    opacity: 0;
    transition: opacity .3s;
  }

  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(0,0,0,.5);
    border-color: rgba(255,255,255,.15);
  }
  .card:hover::before { opacity: 1; }

  .card-icon {
    font-size: 28px;
    line-height: 1;
    margin-bottom: .25rem;
  }

  .card-tag {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: .1rem;
  }

  .card h2 {
    font-size: 19px;
    font-weight: 600;
    letter-spacing: -.01em;
    color: var(--text-primary);
  }

  .card p {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.5;
    margin-top: .15rem;
  }

  .card-arrow {
    margin-top: auto;
    padding-top: 1rem;
    font-size: 13px;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: .3rem;
  }

  /* card accent colors */
  .card.game1 { --accent: #ff9f0a; }
  .card.game2 { --accent: #30d158; }
  .card.note  { --accent: #bf5af2; }
  .card.insta { --accent: #ff375f; }

  /* ── Footer ── */
  footer {
    margin-top: 4rem;
    font-size: 12px;
    color: rgba(255,255,255,.2);
    letter-spacing: .04em;
  }
</style>
</head>
<body>

<section class="hero">
  <div class="avatar">🧑‍💻</div>
  <h1>Taka</h1>
  <p>Games · Writing · Travel</p>
</section>

<div class="grid">

  <a class="card game1" href="https://taka-yamamoto369.github.io/pok-deng/">
    <div class="card-icon">🃏</div>
    <div class="card-tag">Game</div>
    <h2>ポークデン</h2>
    <p>タイのカードゲーム。ベットして、引いて、ディーラーに勝て。</p>
    <div class="card-arrow">Play now →</div>
  </a>

  <a class="card game2" href="https://app-liart-nine-16.vercel.app" target="_blank">
    <div class="card-icon">⚔️</div>
    <div class="card-tag">Game</div>
    <h2>三国志ゲーム</h2>
    <p>Vercelで公開中の三国志シミュレーション。</p>
    <div class="card-arrow">Play now →</div>
  </a>

  <a class="card note" href="https://note.com/sozoro_tabi/n/n906641afa4ad" target="_blank">
    <div class="card-icon">✍️</div>
    <div class="card-tag">Writing</div>
    <h2>同じ釜の飯を食う</h2>
    <p>ラオスの農家の食卓。仲間になる方法はシンプルかもしれない。</p>
    <div class="card-arrow">Read →</div>
  </a>

  <a class="card insta" href="https://instagram.com/" target="_blank">
    <div class="card-icon">📸</div>
    <div class="card-tag">Social</div>
    <h2>Instagram</h2>
    <p>日常の写真、旅の記録。</p>
    <div class="card-arrow">Follow →</div>
  </a>

</div>

<footer>taka-yamamoto369.github.io</footer>

<script>
  // カードにマウス追尾グロー
  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('mousemove', e => {
      const r = card.getBoundingClientRect();
      card.style.setProperty('--mx', ((e.clientX - r.left) / r.width * 100) + '%');
      card.style.setProperty('--my', ((e.clientY - r.top) / r.height * 100) + '%');
    });
  });
</script>

</body>
</html>
